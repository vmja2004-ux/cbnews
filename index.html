<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CB 發行案件彙整系統</title>
  
  <!-- 引入 Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', 'monospace'],
          }
        }
      }
    }
  </script>

  <!-- 內建 SVG 圖示資源 (替換原本的 Lucide React) -->
  <script>
    const Icons = {
      Moon: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-600"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>`,
      Sun: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-amber-400"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>`,
      UploadCloud: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"></path><path d="M12 12v9"></path><path d="m16 16-4-4-4 4"></path></svg>`,
      FileSpreadsheet: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><path d="M8 13h2"></path><path d="M8 17h2"></path><path d="M14 13h2"></path><path d="M14 17h2"></path></svg>`,
      Search: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path></svg>`,
      AlertCircle: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`,
      ArrowUpDown: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 16-4 4-4-4"></path><path d="M17 20V4"></path><path d="m3 8 4-4 4 4"></path><path d="M7 4v16"></path></svg>`,
      ArrowUp: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"></path><path d="M12 19V5"></path></svg>`,
      ArrowDown: `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"></path><path d="m19 12-7 7-7-7"></path></svg>`,
      Sparkles: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path><path d="M5 3v4"></path><path d="M19 17v4"></path><path d="M3 5h4"></path><path d="M17 19h4"></path></svg>`,
      Loader2: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>`,
      ExternalLink: `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>`
    };
  </script>
</head>
<body class="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 transition-colors duration-300 font-sans">
  
  <!-- 頂部導覽列 -->
  <header class="bg-white dark:bg-slate-800 shadow-sm sticky top-0 z-10 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
      <div class="flex items-center gap-2">
        <div class="p-2 bg-indigo-100 dark:bg-indigo-900/50 rounded-lg text-indigo-600 dark:text-indigo-400" id="icon-logo">
          <!-- FileSpreadsheet Icon -->
        </div>
        <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-blue-500 dark:from-indigo-400 dark:to-blue-300">
          CB 發行案件彙整系統
        </h1>
      </div>
      <button
        id="theme-toggle-btn"
        class="p-2 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors"
        aria-label="切換深色模式"
      >
        <!-- Sun/Moon Icon -->
      </button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- 控制區塊 (搜尋與上傳檔案) -->
    <div class="mb-8 bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 transition-colors duration-300">
      <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        
        <!-- 搜尋列 -->
        <div class="flex-1 w-full sm:max-w-sm relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 dark:text-slate-500" id="icon-search">
            <!-- Search Icon -->
          </div>
          <input
            type="text"
            id="search-input"
            placeholder="搜尋代碼或標的名稱 (例如：23742、佳能)..."
            class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 dark:border-slate-600 rounded-xl leading-5 bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm transition-colors shadow-sm"
          />
        </div>
        
        <!-- 上傳檔案按鈕 -->
        <div class="relative w-full sm:w-auto">
          <input
            type="file"
            id="file-input"
            accept=".csv"
            class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
            title="點擊上傳 CSV 檔案"
          />
          <button class="w-full sm:w-auto flex items-center justify-center gap-2 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium transition-colors shadow-sm">
            <span id="icon-upload"></span>
            <span>匯入 CSV 資料</span>
          </button>
        </div>
      </div>

      <!-- 錯誤提示 -->
      <div id="error-container" class="hidden mt-4 p-3 bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400 rounded-lg flex items-center gap-2 text-sm border border-red-200 dark:border-red-800">
        <span id="icon-alert"></span>
        <span id="error-text"></span>
      </div>
    </div>

    <!-- 資料表格區塊 -->
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden transition-colors duration-300">
      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr id="table-head" class="bg-slate-50 dark:bg-slate-800/50 border-b border-slate-200 dark:border-slate-700">
              <!-- 表頭由 JS 動態生成 -->
            </tr>
          </thead>
          <tbody id="table-body" class="divide-y divide-slate-200 dark:divide-slate-700">
            <!-- 表格內容由 JS 動態生成 -->
          </tbody>
        </table>
      </div>
      
      <!-- 表格底部資訊 -->
      <div class="px-6 py-4 border-t border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800/50 text-sm text-slate-500 dark:text-slate-400 flex justify-between items-center">
        <span id="item-count">顯示 0 筆案件資料</span>
        <span class="text-xs">點擊欄位標題即可進行排序</span>
      </div>
    </div>
  </main>

  <script>
    // --- 預設資料與設定 ---
    const SAMPLE_DATA = [
      { 代碼: '25354', 發行標的: '達工四', 溢價率: '101.00%', 發行方式: '-', 'TCRI/擔保': 'TCRI5', '額度(億元)': '10', 年期: '3Y' },
      { 代碼: '22391', 發行標的: '英利-KY一', 溢價率: '101.06%', 發行方式: '-', 'TCRI/擔保': 'TCRI4', '額度(億元)': '11', 年期: '3Y' },
      { 代碼: '82131', 發行標的: '志超一', 溢價率: '107.72%', 發行方式: '-', 'TCRI/擔保': 'TCRI4', '額度(億元)': '8', 年期: '2.5Y' },
      { 代碼: '61012', 發行標的: '寬魚國際二', 溢價率: '105.01%', 發行方式: '詢圈', 'TCRI/擔保': '-', '額度(億元)': '2.5', 年期: '3Y' },
      { 代碼: '23742', 發行標的: '佳能二', 溢價率: '105.19%', 發行方式: '詢圈', 'TCRI/擔保': 'TCRI6', '額度(億元)': '3', 年期: '5Y' },
      { 代碼: '82103', 發行標的: '勤誠三', 溢價率: '103.50%', 發行方式: '競拍', 'TCRI/擔保': 'TCRI4', '額度(億元)': '7', 年期: '3Y' },
    ];

    const COLUMNS = [
      { key: '代碼', label: '代碼' },
      { key: '發行標的', label: '標的名稱' },
      { key: '溢價率', label: '溢價率 (%)' },
      { key: '發行方式', label: '發行方式' },
      { key: 'TCRI/擔保', label: 'TCRI / 擔保' },
    { key: '額度(億元)', label: '額度 (億元)' },
    { key: '年期', label: '年期' },
    { key: 'news_link', label: '相關新聞' }
  ];

  // --- 狀態管理 ---
  let state = {
    data: [...SAMPLE_DATA],
    isDarkMode: false,
    sortConfig: { key: null, direction: null },
    searchQuery: '',
    error: ''
  };

  // --- DOM 元素綁定 ---
    const elements = {
      themeToggleBtn: document.getElementById('theme-toggle-btn'),
      searchInput: document.getElementById('search-input'),
      fileInput: document.getElementById('file-input'),
      errorContainer: document.getElementById('error-container'),
      errorText: document.getElementById('error-text'),
      tableHead: document.getElementById('table-head'),
      tableBody: document.getElementById('table-body'),
      itemCount: document.getElementById('item-count'),
    };

    // 初始化靜態 Icon
    document.getElementById('icon-logo').innerHTML = Icons.FileSpreadsheet;
    document.getElementById('icon-search').innerHTML = Icons.Search;
    document.getElementById('icon-upload').innerHTML = Icons.UploadCloud;
    document.getElementById('icon-alert').innerHTML = Icons.AlertCircle;

    // --- 核心邏輯 ---

    // 1. 深色模式切換
    function toggleDarkMode() {
      state.isDarkMode = !state.isDarkMode;
      if (state.isDarkMode) {
        document.documentElement.classList.add('dark');
        elements.themeToggleBtn.innerHTML = Icons.Sun;
      } else {
        document.documentElement.classList.remove('dark');
        elements.themeToggleBtn.innerHTML = Icons.Moon;
      }
    }

    // 2. CSV 解析器
    function parseCSV(csvText) {
      const lines = csvText.split(/\r?\n/).filter(line => line.trim() !== '');
      if (lines.length < 2) return [];

      const headers = lines[0].split(',').map(h => h.trim());
      
      return lines.slice(1).map(line => {
        const values = [];
        let inQuotes = false;
        let currentValue = '';
        
        for (let i = 0; i < line.length; i++) {
          const char = line[i];
          if (char === '"') {
            inQuotes = !inQuotes;
          } else if (char === ',' && !inQuotes) {
            values.push(currentValue.trim());
            currentValue = '';
          } else {
            currentValue += char;
          }
        }
        values.push(currentValue.trim());

        const rowData = {};
        headers.forEach((header, index) => {
          rowData[header] = values[index] || '-';
        });
        return rowData;
      });
    }

    // 3. 檔案上傳處理
    function handleFileUpload(event) {
      const file = event.target.files[0];
      if (!file) return;

      if (!file.name.endsWith('.csv')) {
        showError('請上傳 .csv 格式的檔案');
        event.target.value = ''; // 重置 input
        return;
      }

      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const text = e.target.result;
          const parsedData = parseCSV(text);
          
          if (parsedData.length > 0) {
            const firstRow = parsedData[0];
            const hasRequiredFields = ['發行標的', '溢價率', '額度(億元)'].every(field => field in firstRow);
            
            if (!hasRequiredFields) {
              showError('CSV 檔案缺少必要的欄位 (如：發行標的, 溢價率, 額度(億元))');
              return;
            }
          }
          
          state.data = parsedData;
          state.sortConfig = { key: null, direction: null };
          hideError();
          render();
        } catch (err) {
          showError('解析檔案時發生錯誤，請檢查檔案格式。');
        }
      };
      reader.readAsText(file);
      event.target.value = ''; // 重置 input 讓下次同檔名也能觸發 onChange
    }

    // 4. 排序邏輯
    window.handleSort = function(key) {
      let direction = 'asc';
      if (state.sortConfig.key === key && state.sortConfig.direction === 'asc') {
        direction = 'desc';
      } else if (state.sortConfig.key === key && state.sortConfig.direction === 'desc') {
        direction = null;
        key = null;
      }
      state.sortConfig = { key, direction };
      render();
    };

    // 5. 錯誤訊息顯示/隱藏
    function showError(msg) {
      elements.errorText.textContent = msg;
      elements.errorContainer.classList.remove('hidden');
    }
    
    function hideError() {
      elements.errorContainer.classList.add('hidden');
      elements.errorText.textContent = '';
    }

    // 6. 計算處理後的資料 (搜尋 + 排序)
    function getProcessedData() {
      let filteredData = state.data;
      
      // 搜尋
      if (state.searchQuery.trim() !== '') {
        const query = state.searchQuery.toLowerCase();
        filteredData = filteredData.filter(row => {
          const targetName = row['發行標的'] || '';
          const targetCode = row['代碼'] || '';
          return targetName.toLowerCase().includes(query) || targetCode.toLowerCase().includes(query);
        });
      }

      // 排序
      if (!state.sortConfig.key || !state.sortConfig.direction) return filteredData;

      return [...filteredData].sort((a, b) => {
        let aValue = a[state.sortConfig.key] || '';
        let bValue = b[state.sortConfig.key] || '';

        const parseValue = (val) => {
          if (typeof val !== 'string') return val;
          const cleanVal = val.replace(/[%$,]/g, '').trim();
          const num = parseFloat(cleanVal);
          return isNaN(num) ? val : num;
        };

        const aParsed = parseValue(aValue);
        const bParsed = parseValue(bValue);

        if (aParsed < bParsed) return state.sortConfig.direction === 'asc' ? -1 : 1;
        if (aParsed > bParsed) return state.sortConfig.direction === 'asc' ? 1 : -1;
        return 0;
      });
    }

// --- 畫面渲染 ---
function render() {
  const processedData = getProcessedData();

  // 渲染表頭
  elements.tableHead.innerHTML = COLUMNS.map(col => {
    let iconHtml = '';
    let sortClass = '';
    let onClick = '';
    
    if (col.key !== 'news_link') {
      iconHtml = `<span class="opacity-0 group-hover:opacity-100 transition-opacity">${Icons.ArrowUpDown}</span>`;
      if (state.sortConfig.key === col.key) {
        iconHtml = `<span class="text-indigo-500">${state.sortConfig.direction === 'asc' ? Icons.ArrowUp : Icons.ArrowDown}</span>`;
      }
      sortClass = 'cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700/50 group select-none';
      onClick = `onclick="handleSort('${col.key}')"`;
    }

    return `
      <th 
        ${onClick}
        class="px-6 py-4 text-sm font-semibold text-slate-600 dark:text-slate-300 whitespace-nowrap transition-colors ${sortClass}"
      >
        <div class="flex items-center gap-2">
          ${col.label}
          <span class="text-slate-400 dark:text-slate-500 transition-colors flex items-center">
            ${iconHtml}
          </span>
        </div>
      </th>
    `;
  }).join('');

  // 渲染表格內容
  if (processedData.length > 0) {
    elements.tableBody.innerHTML = processedData.map(row => {
      const tds = COLUMNS.map(col => {
        // 處理 Google 新聞連結欄位
        if (col.key === 'news_link') {
           // 取前 4 碼作為股票代碼
           const baseStockCode = String(row['代碼'] || '').substring(0, 4);
           // 組合搜尋關鍵字 (包含公司名稱、代碼，並引導搜尋產業動態與概念股)
           const query = encodeURIComponent(`${row['發行標的']} ${baseStockCode} 產業動態 概念股`);
           // 建立 Google 搜尋網址 (如果加上 &tbm=nws 則會預設跳轉到"新聞"分頁，這裡使用一般搜尋以觸發 Google AI 摘要)
           const searchUrl = `https://www.google.com/search?q=${query}`;
           
           const content = `
             <a href="${searchUrl}" target="_blank" rel="noopener noreferrer" title="在新分頁搜尋此標的相關新聞" class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-blue-600 bg-blue-50 hover:bg-blue-100 dark:text-blue-400 dark:bg-blue-900/40 dark:hover:bg-blue-900/60 rounded-lg transition-colors shadow-sm whitespace-nowrap border border-blue-100 dark:border-blue-800 w-fit">
               ${Icons.ExternalLink} Google 搜尋
             </a>
           `;
           return `<td class="px-6 py-4 align-top pt-5">${content}</td>`;
        }

        // 處理一般欄位
        const value = row[col.key] || '-';
        const displayValue = value === '' ? '-' : value;
        
        let textClass = 'text-slate-700 dark:text-slate-300 whitespace-nowrap';
        if (col.key === '代碼') textClass = 'font-mono text-slate-500 dark:text-slate-400 whitespace-nowrap';
        if (col.key === '發行標的') textClass = 'font-medium text-indigo-600 dark:text-indigo-400 whitespace-nowrap';

        return `<td class="px-6 py-4 text-sm align-top ${textClass} pt-5">${displayValue}</td>`;
      }).join('');

      return `<tr class="hover:bg-indigo-50/50 dark:hover:bg-indigo-900/20 transition-colors group border-b border-transparent hover:border-indigo-100 dark:hover:border-indigo-800">${tds}</tr>`;
    }).join('');
  } else {
    const emptyMsg = state.searchQuery ? '找不到符合搜尋條件的標的，請嘗試其他關鍵字。' : '目前沒有資料，請上傳 CSV 檔案。';
    elements.tableBody.innerHTML = `
      <tr>
        <td colspan="${COLUMNS.length}" class="px-6 py-12 text-center text-slate-500 dark:text-slate-400">
          ${emptyMsg}
        </td>
      </tr>
    `;
  }

  // 更新計數
  elements.itemCount.textContent = `顯示 ${processedData.length} 筆案件資料`;
}

// --- 事件監聽綁定 ---
    elements.themeToggleBtn.addEventListener('click', toggleDarkMode);
    
    elements.searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      render();
    });

    elements.fileInput.addEventListener('change', handleFileUpload);

    // --- 初始啟動 ---
    // 設定初始圖示 (預設為淺色模式，顯示月亮)
    elements.themeToggleBtn.innerHTML = Icons.Moon;
    render();
    
  </script>
</body>
</html>
